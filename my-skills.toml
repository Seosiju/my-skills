schema_version = 1
skills_root = "skills"

[defaults]
install_mode = "copy"
collision = "error"
verify_after_install = true

[targets.claude]
enabled = true
scope = "user"
path = "~/.claude/skills"

[targets.codex]
enabled = true
scope = "user"
path = "~/.agents/skills"

[targets.hermes]
enabled = true
scope = "user"
path = "~/.hermes/skills"

[skills.cli-inventory]
enabled = true
hosts = ["claude", "codex", "hermes"]

[skills.personal-profile]
enabled = true
hosts = ["claude", "codex", "hermes"]

[skills.my-skills]
enabled = true
hosts = ["claude", "codex", "hermes"]

[skills.my-jira]
enabled = true
hosts = ["claude", "codex", "hermes"]
